name: Publish Library Web Viewer

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Build and push Docker image
        run: |
          docker login --username lemon-sk --password ${{ secrets.GH_TOKEN }} ghcr.io
          docker build -f dockerfile . --tag ghcr.io/Jinkerts-com/Library-Web-Viewer:latest
          docker push ghcr.io/Jinkerts-com/Library-Web-Viewer:latest